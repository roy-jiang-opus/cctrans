name: Feature request
description: Suggest an idea or improvement for cctrans.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, a quick skim of ROADMAP.md and the "Constraints" section of
        CLAUDE.md may save you time — some apparent gaps (e.g. an in-TUI hotkey,
        rewriting the prompt on input translation) are Claude Code hook limitations,
        not missing features.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the situation or friction, not just the feature — context helps find the best fix.
      placeholder: e.g. "I switch between zh-Hans and ja several times a day and retyping the lang command is tedious."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like cctrans to do?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you've tried or thought about.
    validations:
      required: false
